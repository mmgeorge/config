name = "search-explorer"
description = "Use for web-search research: current facts, news, prices, laws, schedules, releases, recommendations, source discovery, cross-checking, and concise evidence-backed web summaries. This is not primarily a codebase explorer. NOT for local codebase exploration or GitHub source tracing; use the built-in explorer or remote-code-explorer for those."
