model = "gpt-5.5"
model_reasoning_effort = "medium"
model_reasoning_summary = "detailed"
show_raw_agent_reasoning = true
plan_mode_reasoning_effort = "high"
hide_agent_reasoning = false
personality = "pragmatic"
disable_paste_burst = true

[features]
powershell_utf8 = true
steer = true
multi_agent = true
enable_fanout = true
memories = true

[projects.'\\?\D:\code\ferrous']
trust_level = "trusted"

[projects.'d:\code\ferrous']
trust_level = "trusted"

[projects.'D:\']
trust_level = "trusted"

[projects.'\\?\D:\config']
trust_level = "trusted"

[projects.'\\?\D:\code\codex']
trust_level = "trusted"

[projects.'\\?\D:\code\papers']
trust_level = "trusted"

[projects.'D:\code']
trust_level = "trusted"

[projects.'C:\Users\mattm']
trust_level = "trusted"

[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.3-codex" = "gpt-5.4"

[mcp_servers.microsoft-learn]
url = "https://learn.microsoft.com/api/mcp"

[mcp_servers.docs-mcp]
command = "docs-mcp"

[mcp_servers.google-dev-knowledge]
url = "https://developerknowledge.googleapis.com/mcp"

[mcp_servers.google-dev-knowledge.env_http_headers]
X-Goog-Api-Key = "GOOGLE_DEV_KNOWLEDGE_MCP_KEY"

[mcp_servers.chrome-devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest", "--channel=beta"]

[mcp_servers.github]
command = "github-mcp-server"
args = ["stdio", "--toolsets=context,actions,discussions,issues,labels,notifications,orgs,projects,pull_requests,repos,users"]

[mcp_servers.github.env]
GITHUB_PERSONAL_ACCESS_TOKEN = "GITHUB_AGENT_PERSONAL_ACCESS_TOKEN"

[mcp_servers.hf-mcp-server]
url = "https://huggingface.co/mcp?login"

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.openaiDeveloperDocs.tools.search_openai_docs]
approval_mode = "approve"

[mcp_servers.openaiDeveloperDocs.tools.fetch_openai_doc]
approval_mode = "approve"

