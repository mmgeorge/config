open_line_below = "shift-a"
paste_after = "y"
start_yank_operator = "l"
yank_line = "shift-l"
delete_char = "j"
start_delete_operator = []

[tui.keymap.vim_operator]
motion_left = "n"
motion_right = "i"
motion_up = "s"
motion_down = "t"
motion_word_backward = "r"
motion_word_end = "h"
motion_line_start = ";"
